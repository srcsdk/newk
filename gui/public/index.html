<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>newk feed reader</title>
    <style>
        body {
            background: #1e1e1e;
            color: #ccc;
            font-family: monospace;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #fff; font-size: 18px; }
        .feed-item {
            border-bottom: 1px solid #333;
            padding: 8px 0;
        }
        .feed-item .title {
            color: #4ec9b0;
            text-decoration: none;
        }
        .feed-item .title:hover { text-decoration: underline; }
        .feed-item .date { color: #666; font-size: 12px; }
        .feed-item .category { color: #888; font-size: 11px; }
        .controls { margin: 10px 0; }
        .controls button {
            background: #333;
            color: #ccc;
            border: 1px solid #555;
            padding: 4px 12px;
            cursor: pointer;
            font-family: monospace;
        }
        .controls button:hover { background: #444; }
        #status { color: #666; font-size: 12px; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>newk</h1>
    <div class="controls">
        <button onclick="load_items()">refresh</button>
    </div>
    <div id="status">loading...</div>
    <div id="items"></div>

    <script>
        function load_items() {
            document.getElementById('status').textContent = 'loading...';
            fetch('/api/scrape')
                .then(r => r.json())
                .then(items => {
                    const container = document.getElementById('items');
                    container.innerHTML = '';
                    items.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'feed-item';
                        const date = (item.date || '').substring(0, 10);
                        div.innerHTML = '<a class="title" href="' + item.link + '" target="_blank">'
                            + item.title + '</a>'
                            + '<div class="date">' + date + '</div>'
                            + '<div class="category">' + (item.category || '') + '</div>';
                        container.appendChild(div);
                    });
                    document.getElementById('status').textContent = items.length + ' items';
                })
                .catch(err => {
                    document.getElementById('status').textContent = 'error: ' + err.message;
                });
        }
        load_items();
    </script>
</body>
</html>
